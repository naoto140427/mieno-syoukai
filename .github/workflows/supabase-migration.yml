name: Deploy Supabase Migrations

on:
  push:
    branches:
      - preview
      - main
  workflow_dispatch:

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push DB Migrations (Preview)
        if: github.ref == 'refs/heads/preview'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PREVIEW_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: nfcejbkgispqyrtbggnk
        run: |
          echo "Deploying to Preview Supabase Project..."
          supabase db push --project-ref $SUPABASE_PROJECT_ID

      - name: Push DB Migrations (Production)
        if: github.ref == 'refs/heads/main'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
          # ProductionのProject IDは、もし別プロジェクトであればここを環境変数やシークレットで書き換えてください。
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROD_PROJECT_ID }} 
        run: |
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Error: SUPABASE_PROD_PROJECT_ID is not set in GitHub Secrets."
            exit 1
          fi
          echo "Deploying to Production Supabase Project..."
          supabase db push --project-ref $SUPABASE_PROJECT_ID
